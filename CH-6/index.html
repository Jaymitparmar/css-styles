<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Index & Overflow</title>

    <style>
        body {
            font-size: 30px;
        }

        /* div {
            border-radius: 20px;
            padding: 10px;
            text-align: right;
        } */

        .box {
            height: 500px;
            width: 500px;
            border: 2px solid gray;
            position: relative;
            top: 100px;
            left: 150px;
        }

        .one {
            height: 300px;
            width: 300px;
            background-color: red;
            position: absolute;
            top: 30px;
            left: 50px;
            z-index: 1;
        }

        .two {
            height: 300px;
            width: 300px;
            background-color: yellow;
            position: absolute;
            top: 80px;
            left: 100px;
            z-index: 3;
        }

        .three {
            height: 300px;
            width: 300px;
            background-color: orange;
            position: absolute;
            top: 120px;
            left: 150px;
            z-index: 2;
        }

        .container {
            height: 600px;
            width: 600px;
            border: 2px solid gray;
            position: relative;
            border-radius: 20px;
            top: 100px;
            left: 150px;
            overflow: hidden;
        }

        .image {
            height: 500px;
            width: 100%;
            position: absolute;
            z-index: 1;
        }

        img {
            width: 100%;
        }

        .content {
            position: absolute;
            z-index: 2;
            height: 300px;
            width: 300px;
            color: #fff;
            border: 5px solid white;
            margin: auto;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            text-align: center;
            overflow: hidden;
            border-radius: 20px;
        }
    </style>
</head>

<body>
    <div class="box">
        <div class="one">01</div>
        <div class="two">02</div>
        <div class="three">03</div>
    </div>

    <div class="container">
        <div class="content">
            <h1>Natural</h1>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Totam ab illo fugit molestias sint soluta
                nostrum repellat ipsam obcaecati commodi eum, nemo assumenda aperiam qui odit hic itaque dolor officia?
            </p>
        </div>

        <div class="image">
            <img src="https://i.pinimg.com/564x/b5/d3/c3/b5d3c31d61cc4e62d0f22f7472b95a05.jpg" alt="">
        </div>
    </div>
</body>

</html>
